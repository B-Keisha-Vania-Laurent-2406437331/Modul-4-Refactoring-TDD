<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
<h1>Order History</h1>
<form method="post" th:action="@{/order/history}">
    <label>Name: <input type="text" name="author" required/></label><br/>
    <button type="submit">Search</button>
</form>

<div th:if="${orders != null}">
    <table border="1">
        <tr>
            <th>ID</th><th>Author</th><th>Status</th><th>Action</th>
        </tr>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.author}"></td>
            <td th:text="${order.status}"></td>
            <td><a th:href="@{/order/pay/{id}(id=${order.id})}">Pay</a></td>
        </tr>
    </table>
</div>
</body>
</html>
